<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geomaster - Desafio das Capitais</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #111827;
            --card-bg: #1F2937;
            --text: #F9FAFB;
            --text-muted: #9CA3AF;
            --success: #10B981;
            --danger: #EF4444;
            --gold: #F59E0B;
            --xp-color: #8B5CF6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1, h2 { margin-top: 0; }
        .hidden { display: none !important; }

        input, button, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 0.5rem;
            border: none;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input, select {
            background-color: #374151;
            color: white;
            outline: none;
            cursor: pointer;
        }

        button {
            background-color: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:active { transform: scale(0.98); }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: var(--text-muted); cursor: not-allowed; transform: none; }

        .btn-alt { background-color: #374151; margin-bottom: 10px; text-align: left; padding-left: 20px;}
        .btn-alt:hover { background-color: #4B5563; }
        .btn-powerup { background-color: var(--gold); color: #000; }
        .btn-powerup:hover { background-color: #D97706; }

        .correct { background-color: var(--success) !important; color: white; }
        .wrong { background-color: var(--danger) !important; color: white; }

        /* Estilos de Gamificação / RPG */
        .player-profile {
            background-color: #374151;
            padding: 15px;
            border-radius: 0.5rem;
            margin-bottom: 20px;
            text-align: left;
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .player-name { font-weight: bold; font-size: 1.2rem; }
        .player-rank { font-size: 0.8rem; color: var(--gold); font-weight: bold; text-transform: uppercase; }
        .player-coins { font-weight: bold; color: var(--gold); }

        .xp-container {
            width: 100%;
            background-color: #1F2937;
            border-radius: 10px;
            height: 10px;
            margin-top: 5px;
            overflow: hidden;
            position: relative;
        }

        .xp-bar {
            height: 100%;
            background-color: var(--xp-color);
            width: 0%;
            transition: width 0.5s ease-out;
        }

        .xp-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: right;
            margin-top: 2px;
            display: block;
        }

        .diff-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: bold;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div id="auth-screen" class="container">
        <h1>🌍 Geomaster</h1>
        <p style="color: var(--text-muted);">Crie seu perfil para salvar seu progresso</p>
        <input type="text" id="username" placeholder="Nome do Explorador">
        <button onclick="login()">Iniciar Jornada</button>
    </div>

    <div id="menu-screen" class="container hidden">
        <div class="player-profile">
            <div class="profile-header">
                <div>
                    <div class="player-name" id="display-name">Jogador</div>
                    <div class="player-rank" id="display-rank">Novato</div>
                </div>
                <div class="player-coins">🪙 <span id="display-coins">50</span></div>
            </div>
            <div style="font-size: 0.9rem; font-weight: bold;">Nível <span id="display-level">1</span></div>
            <div class="xp-container">
                <div class="xp-bar" id="xp-fill"></div>
            </div>
            <span class="xp-text"><span id="display-xp">0</span> / <span id="display-xp-max">100</span> XP</span>
        </div>

        <h3 style="margin-bottom: 10px; text-align: left;">1. Escolha a Região</h3>
        <select id="continente-select">
            <option value="todos">🌍 Todos os Continentes</option>
            <option value="america">🌎 América</option>
            <option value="europa">🇪🇺 Europa</option>
            <option value="asia">⛩️ Ásia</option>
            <option value="africa">🦁 África</option>
            <option value="oceania">🦘 Oceania</option>
        </select>

        <h3 style="margin-bottom: 10px; text-align: left;">2. Escolha a Dificuldade</h3>
        <div class="diff-selector">
            <button onclick="startGame('facil')" style="background-color: var(--success);">Fácil</button>
            <button onclick="startGame('medio')" style="background-color: #F59E0B;">Médio</button>
            <button onclick="startGame('dificil')" style="background-color: var(--danger);">Difícil</button>
        </div>
    </div>

    <div id="game-screen" class="container hidden">
        <div class="game-header">
            <span>Progresso: <span id="question-count" style="color: white;">1/5</span></span>
            <span>🪙 <span id="game-coins" style="color: var(--gold);"></span></span>
        </div>
        <h2 id="question-text" style="margin-bottom: 25px;">Qual é a capital de...?</h2>
        
        <div id="alternatives"></div>

        <button id="btn-ajuda" class="btn-powerup" onclick="usarAjuda()" style="margin-top: 10px;">
            💡 Eliminar 2 erradas (Custa 20 🪙)
        </button>
        <button class="hidden" id="btn-next" onclick="nextQuestion()" style="margin-top: 15px;">Próxima Pergunta ➔</button>
    </div>

    <div id="result-screen" class="container hidden">
        <h2>Missão Concluída!</h2>
        <p>Você acertou <strong id="score-result" style="color: var(--primary); font-size: 1.2rem;">0</strong> de <span id="total-questions">5</span> perguntas.</p>
        
        <div style="background-color: #374151; padding: 15px; border-radius: 0.5rem; margin: 20px 0;">
            <p style="margin: 0; color: var(--xp-color); font-weight: bold;">+ <span id="reward-xp">0</span> XP</p>
            <p style="margin: 5px 0 0 0; color: var(--gold); font-weight: bold;">+ <span id="reward-coins">0</span> 🪙</p>
        </div>

        <p id="levelup-text" style="color: var(--success); font-weight: bold; font-size: 1.1rem; display: none;">🎉 Subiu de Nível!</p>
        <button onclick="showMenu()">Voltar ao Acampamento</button>
    </div>

    <script>
        let bancoPerguntas = {};
        let usuario = { nome: '', nivel: 1, xp: 0, moedas: 50 };
        let quizAtual = [];
        let perguntaAtualIndex = 0;
        let acertos = 0;
        let dificuldadeAtual = '';

        // Carrega o JSON ao abrir a página
        async function carregarDadosDoServidor() {
            try {
                const resposta = await fetch('perguntas.json');
                bancoPerguntas = await resposta.json();
            } catch (erro) {
                alert("Erro ao carregar o banco de dados. Verifique se o perguntas.json está na mesma pasta.");
            }
        }
        carregarDadosDoServidor();

        // --- SISTEMA DE PROGRESSÃO ---
        function calcularXpMaximo(nivel) {
            // Curva de dificuldade: cada nível exige mais XP (100, 150, 225...)
            return Math.floor(100 * Math.pow(1.5, nivel - 1));
        }

        function obterRank(nivel) {
            if (nivel < 3) return "Mochileiro Novato";
            if (nivel < 6) return "Turista Frequente";
            if (nivel < 10) return "Explorador Experiente";
            if (nivel < 15) return "Guia Mestre";
            return "Lenda Global";
        }

        // --- LOGIN E SAVE ---
        function login() {
            const inputNome = document.getElementById('username').value.trim();
            if (!inputNome) return alert("Digite um nome!");
            
            const userSalvo = localStorage.getItem('geomaster_' + inputNome);
            if (userSalvo) {
                usuario = JSON.parse(userSalvo);
                // Garantir compatibilidade se o usuário antigo não tiver os status novos
                if (!usuario.xp) usuario.xp = 0;
            } else {
                usuario = { nome: inputNome, nivel: 1, xp: 0, moedas: 50 };
                salvarProgresso();
            }
            
            atualizarUI();
            trocarTela('auth-screen', 'menu-screen');
        }

        function salvarProgresso() {
            localStorage.setItem('geomaster_' + usuario.nome, JSON.stringify(usuario));
            atualizarUI();
        }

        function atualizarUI() {
            const xpMax = calcularXpMaximo(usuario.nivel);
            const xpPorcentagem = Math.min((usuario.xp / xpMax) * 100, 100);

            document.getElementById('display-name').innerText = usuario.nome;
            document.getElementById('display-level').innerText = usuario.nivel;
            document.getElementById('display-coins').innerText = usuario.moedas;
            document.getElementById('display-rank').innerText = obterRank(usuario.nivel);
            document.getElementById('display-xp').innerText = Math.floor(usuario.xp);
            document.getElementById('display-xp-max').innerText = xpMax;
            document.getElementById('xp-fill').style.width = xpPorcentagem + '%';
            
            document.getElementById('game-coins').innerText = usuario.moedas;
        }

        // --- LÓGICA DO JOGO ---
        function startGame(dificuldade) {
            if (!bancoPerguntas[dificuldade]) return alert("Aguarde carregar as perguntas...");
            
            dificuldadeAtual = dificuldade;
            const regiao = document.getElementById('continente-select').value;
            
            // Filtra as perguntas pelo continente selecionado
            let poolPerguntas = bancoPerguntas[dificuldade];
            if (regiao !== 'todos') {
                poolPerguntas = poolPerguntas.filter(q => q.continente === regiao);
            }

            if (poolPerguntas.length < 3) {
                return alert("Não temos perguntas suficientes para esta região nesta dificuldade. Escolha outra combinação!");
            }

            // Pega no máximo 5 perguntas aleatórias do pool filtrado
            quizAtual = [...poolPerguntas].sort(() => 0.5 - Math.random()).slice(0, 5);
            
            perguntaAtualIndex = 0;
            acertos = 0;
            
            trocarTela('menu-screen', 'game-screen');
            carregarPergunta();
        }

        function carregarPergunta() {
            document.getElementById('btn-next').classList.add('hidden');
            document.getElementById('btn-ajuda').disabled = usuario.moedas < 20;
            
            const p = quizAtual[perguntaAtualIndex];
            document.getElementById('question-count').innerText = `${perguntaAtualIndex + 1}/${quizAtual.length}`;
            document.getElementById('question-text').innerText = `Qual é a capital de(a) ${p.p}?`;
            
            let opcoes = [p.r, ...p.erradas];
            opcoes.sort(() => 0.5 - Math.random());

            const divAlts = document.getElementById('alternatives');
            divAlts.innerHTML = '';
            
            opcoes.forEach(opcao => {
                const btn = document.createElement('button');
                btn.className = 'btn-alt';
                btn.innerText = opcao;
                btn.onclick = () => verificarResposta(btn, opcao, p.r);
                divAlts.appendChild(btn);
            });
        }

        function verificarResposta(btnClicado, respostaEscolhida, respostaCerta) {
            const botoes = document.getElementById('alternatives').children;
            for(let btn of botoes) { btn.disabled = true; }
            document.getElementById('btn-ajuda').disabled = true;

            if (respostaEscolhida === respostaCerta) {
                btnClicado.classList.add('correct');
                acertos++;
            } else {
                btnClicado.classList.add('wrong');
                for(let btn of botoes) {
                    if (btn.innerText === respostaCerta) btn.classList.add('correct');
                }
            }
            document.getElementById('btn-next').classList.remove('hidden');
        }

        function usarAjuda() {
            if (usuario.moedas < 20) return;
            usuario.moedas -= 20;
            salvarProgresso();
            document.getElementById('btn-ajuda').disabled = true;

            const p = quizAtual[perguntaAtualIndex];
            const botoes = document.getElementById('alternatives').children;
            let removidos = 0;

            for(let btn of botoes) {
                if (btn.innerText !== p.r && removidos < 2) {
                    btn.style.opacity = '0.3';
                    btn.disabled = true;
                    removidos++;
                }
            }
        }

        function nextQuestion() {
            perguntaAtualIndex++;
            if (perguntaAtualIndex >= quizAtual.length) {
                finalizarJogo();
            } else {
                carregarPergunta();
            }
        }

        function finalizarJogo() {
            trocarTela('game-screen', 'result-screen');
            document.getElementById('score-result').innerText = acertos;
            document.getElementById('total-questions').innerText = quizAtual.length;

            // Recompensas baseadas na dificuldade
            let multiplicadorXP = dificuldadeAtual === 'facil' ? 1 : dificuldadeAtual === 'medio' ? 1.5 : 2.5;
            let xpGanha = Math.floor(acertos * 25 * multiplicadorXP);
            let moedasGanhas = acertos * (dificuldadeAtual === 'facil' ? 5 : dificuldadeAtual === 'medio' ? 10 : 20);

            document.getElementById('reward-xp').innerText = xpGanha;
            document.getElementById('reward-coins').innerText = moedasGanhas;

            usuario.xp += xpGanha;
            usuario.moedas += moedasGanhas;

            // Verificação de Level Up
            let subiuNivel = false;
            let xpMax = calcularXpMaximo(usuario.nivel);
            
            while (usuario.xp >= xpMax) {
                usuario.xp -= xpMax;
                usuario.nivel++;
                subiuNivel = true;
                xpMax = calcularXpMaximo(usuario.nivel); // Recalcula para o novo nível
            }

            document.getElementById('levelup-text').style.display = subiuNivel ? 'block' : 'none';

            salvarProgresso();
        }

        function trocarTela(saindo, entrando) {
            document.getElementById(saindo).classList.add('hidden');
            document.getElementById(entrando).classList.remove('hidden');
        }

        function showMenu() {
            trocarTela('result-screen', 'menu-screen');
        }
    </script>
</body>
</html>
